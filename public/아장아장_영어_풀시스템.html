
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);}
.w{padding:1rem 0;}

/* NAV */
.top-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.nb{padding:7px 15px;border-radius:999px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;font-size:12px;font-weight:500;color:var(--color-text-secondary);transition:all .15s;}
.nb:hover{color:var(--color-text-primary);border-color:var(--color-border-secondary);}
.nb.on{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;}

.age-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.ab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;font-size:12px;color:var(--color-text-secondary);}
.ab.on{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;font-weight:500;}

.panel{display:none;flex-direction:column;gap:10px;}
.panel.show{display:flex;}

/* CARDS */
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;}
.lbl{font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--color-text-tertiary);text-transform:uppercase;margin-bottom:6px;}
.title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;}
.body{font-size:13px;line-height:1.75;color:var(--color-text-secondary);}

.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:8px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}

.mc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem;}
.ml{font-size:10px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:3px;}
.mv{font-size:13px;color:var(--color-text-primary);line-height:1.6;}

/* CODE */
.code{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1rem;margin-top:8px;border-left:3px solid #85B7EB;}
.code.gold{border-color:#EF9F27;}
.code.green{border-color:#5DCAA5;}
.code.purple{border-color:#AFA9EC;}
.cl{font-size:10px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:5px;letter-spacing:.05em;}
.ct{font-size:11px;line-height:1.85;color:var(--color-text-secondary);font-family:var(--font-mono);white-space:pre-wrap;}

/* TAGS */
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:999px;font-weight:500;margin:2px;}
.tb{background:#E6F1FB;color:#185FA5;}
.tg{background:#E1F5EE;color:#0F6E56;}
.ta{background:#FAEEDA;color:#854F0B;}
.tp{background:#EEEDFE;color:#3C3489;}
.tc{background:#FAECE7;color:#993C1D;}
.tr{background:var(--color-background-secondary);color:var(--color-text-secondary);}

/* FLOW */
.flow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:8px;}
.fb{padding:6px 10px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500;text-align:center;}
.fb-b{background:#E6F1FB;color:#185FA5;}
.fb-g{background:#E1F5EE;color:#0F6E56;}
.fb-a{background:#FAEEDA;color:#854F0B;}
.fb-p{background:#EEEDFE;color:#3C3489;}
.fb-c{background:#FAECE7;color:#993C1D;}
.fb-gr{background:var(--color-background-secondary);color:var(--color-text-secondary);}
.arr{font-size:12px;color:var(--color-text-tertiary);}

/* GAME CARDS */
.gc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem;border:0.5px solid var(--color-border-tertiary);}
.gi{font-size:22px;margin-bottom:5px;}
.gn{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px;}
.gd{font-size:11px;color:var(--color-text-secondary);line-height:1.55;}
.gm{margin-top:6px;}
.gbadge{font-size:10px;padding:2px 8px;border-radius:999px;background:#E6F1FB;color:#185FA5;font-weight:500;}

/* STEP */
.srow{display:flex;gap:10px;margin-bottom:10px;}
.snum{width:22px;height:22px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--color-text-secondary);margin-top:1px;}
.sc{flex:1;}
.st{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;}
.sd{font-size:12px;color:var(--color-text-secondary);line-height:1.65;}
.sdiv{height:.5px;background:var(--color-border-tertiary);margin:6px 0;}

.copy-btn{width:100%;margin-top:8px;padding:6px;font-size:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary);}
.copy-btn:hover{background:var(--color-background-secondary);}

.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
</style>

async function getOrCreateTTS(
  text: string,
  ssml: string,
  age_group: string
) {
  const cacheKey = btoa(ssml + age_group); // base64 해시

  const { data: cached } = await supabase
    .from('tts_pool')
    .select('audio_url')
    .eq('cache_key', cacheKey)
    .single();

  if (cached) return cached.audio_url;

  // Google Neural2 TTS 생성
  const audio = await googleTTS({
    input: { ssml },
    voice: { languageCode: 'en-US', name: getVoice(age_group) },
    audioConfig: { audioEncoding: 'MP3' }
  });

  const audioUrl = await uploadToSupabase(audio, cacheKey);
  await supabase.from('tts_pool').insert({ cache_key: cacheKey, audio_url: audioUrl, age_group });

  return audioUrl;
}

function getVoice(age: string) {
  const n = parseInt(age);
  if (n <= 2) return 'en-US-Neural2-J'; // 밝고 높은 톤
  if (n <= 6) return 'en-US-Neural2-A'; // 따뜻한 여성
  return 'en-US-Neural2-D';             // 안정적 성인
}</div></div>
